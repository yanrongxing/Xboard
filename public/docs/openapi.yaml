        in: path
        name: method
        description: ''
        example: natus
        required: true
        schema:
          type: string
      -
        in: path
        name: uuid
        description: ''
        example: 145d25e7-6a57-3fa8-b247-30ebcaf7daa8
        required: true
        schema:

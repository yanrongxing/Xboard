  /api/v1/client/subscribe:
    get:
      summary: '获取节点订阅配置 (Subscribe)'
      operationId: Subscribe
      description: "各大代理客户端（如Clash, V2ray, Shadowrocket等）使用的统一订阅获取接口。\n根据请求头的 User-Agent 或 flag 动态下发对应格式的协议节点配置。"
      parameters:
        -
          in: query
          name: flag
          description: '强制指定客户端类型标识(如 clash, v2ray, shadowrocket)'
          example: error
          required: false
          schema:
            type: string
            description: '强制指定客户端类型标识(如 clash, v2ray, shadowrocket)'
            example: error
        -
          in: query
          name: types
          description: '取特定的节点类型（如 vmess|vless|trojan)'
          example: quas
          required: false
          schema:
            type: string
            description: '取特定的节点类型（如 vmess|vless|trojan)'
            example: quas
        -
          in: query
          name: filter
          description: 只保留包含特定关键字名称的节点
          example: ex
          required: false
          schema:
            type: string
            description: 只保留包含特定关键字名称的节点
            example: ex
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: plain/text
      tags:
        - '用户端 API (User & Guest)'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                types:
                  type: string
                  description: ''
                  example: aut
                  nullable: true
                filter:
                  type: string
                  description: ''
                  example: quas
                  nullable: true
                flag:
                  type: string
                  description: ''
                  example: nostrum
                  nullable: true
      security: []

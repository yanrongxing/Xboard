  '/api/v1/guest/payment/notify/{method}/{uuid}':
    get:
      summary: '支付网关异步回调通知 (Webhook)'
      operationId: Webhook
      description: "用于接收第三方支付平台异步发送的订单支付结果通知，验证签名后更改内部订单状态并下发服务。\n该接口无需身份认证，完全依赖网关签名校验。"
      parameters: []
      responses:
        200:
          description: ''
          content:
